<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Work+Sans:wght@300;400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand-gold:#FFD243;--brand-teal:#018D8A;--brand-navy:#004255;--brand-cream:#F5F0E8;
  --gold-50:#FFF8DE;--gold-100:#FFEDA8;--gold-500:#FFD243;--gold-700:#D9A800;--gold-900:#7A5F00;
  --teal-500:#018D8A;--teal-700:#016562;--navy-500:#004255;--navy-700:#002E3C;--navy-900:#001921;
  --cream-50:#FBF8F2;--cream-100:#F5F0E8;--cream-300:#E6DCC9;
  --bg:var(--cream-100);--bg2:var(--cream-50);--bg3:#EDE8DF;
  --text:var(--navy-900);--text2:var(--navy-700);--text3:#5C6F78;
  --border:rgba(0,66,85,0.14);--border2:rgba(0,66,85,0.32);
  --green-bg:#eaf3de;--green-fg:#27500a;--amber-bg:#faeeda;--amber-fg:#633806;--red-bg:#fcebeb;--red-fg:#791f1f;--blue-bg:#e6f1fb;--blue-fg:#0c447c;
  --r:8px;--r-lg:14px;--shadow:0 1px 2px rgba(0,66,85,0.08);--shadow-2:0 4px 12px rgba(0,66,85,0.10);
  --font-display:'Playfair Display',Georgia,serif;--font-sans:'Work Sans',-apple-system,'Helvetica Neue',Arial,sans-serif;
}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--font-sans);background:var(--bg3);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}
.page{max-width:980px;margin:0 auto;padding:1.5rem}
@media(max-width:600px){.page{padding:1rem 0.875rem}}
.title{font-family:var(--font-display);font-size:22px;font-weight:700;letter-spacing:-0.02em}
.subtitle{font-size:13px;color:var(--text2);margin-top:2px}
.section-label{font-size:11px;font-weight:600;color:var(--teal-500);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px}
.field-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow)}
.stat-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;box-shadow:var(--shadow-2)}
.stat-card.muted{background:var(--bg2);border-color:transparent;box-shadow:none}
.stat-label{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px}
.stat-value{font-size:21px;font-weight:600;line-height:1;letter-spacing:-0.02em}
.stat-sub{font-size:12px;color:var(--text2);margin-top:4px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
@media(max-width:600px){.stats-row{grid-template-columns:repeat(2,1fr)}}
button{font-family:inherit;cursor:pointer;border-radius:var(--r);font-size:13px;transition:all 0.15s;-webkit-tap-highlight-color:transparent}
button:hover{opacity:0.85}
.btn-primary{background:var(--brand-navy);color:var(--cream-100);border:none;padding:9px 18px;font-weight:500;letter-spacing:0.01em}
.btn-primary:active{opacity:0.8;transform:scale(0.98)}
.btn-ghost{background:var(--bg);border:0.5px solid var(--border2);color:var(--text);padding:8px 14px}
.btn-ghost:active{background:var(--bg2)}
.btn-danger{background:transparent;border:0.5px solid rgba(226,75,74,0.4);color:#a32d2d;padding:7px 12px;font-size:12px}
.btn-icon{background:transparent;border:none;color:var(--text2);padding:6px;font-size:18px;line-height:1;border-radius:var(--r)}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--text);background:var(--bg2);border:0.5px solid transparent;border-radius:var(--r);padding:10px 12px;width:100%;outline:none;-webkit-appearance:none;appearance:none;transition:border-color 0.15s,background 0.15s}
input:focus,select:focus,textarea:focus{background:var(--bg);border-color:var(--border2);box-shadow:0 0 0 3px rgba(0,0,0,0.05)}
textarea{resize:vertical;min-height:80px;line-height:1.6}
.input-ghost{background:transparent;border:none;padding:0;font-size:22px;font-weight:600;letter-spacing:-0.025em;border-radius:0}
.input-ghost:focus{background:transparent;border:none;box-shadow:none;border-bottom:1.5px solid var(--border2)}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;white-space:nowrap}
.tbl-head{display:grid;background:var(--bg2);border-bottom:0.5px solid var(--border);padding:9px 16px;gap:10px}
.tbl-head>div{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em}
.tbl-row{display:grid;padding:13px 16px;gap:10px;align-items:center;border-bottom:0.5px solid var(--border);cursor:pointer;transition:background 0.1s}
.tbl-row:last-child{border-bottom:none}
.tbl-row:hover{background:var(--bg2)}
.tbl-row:active{background:var(--bg3)}
@media(max-width:640px){.tbl-head{display:none}.tbl-row{display:flex;flex-direction:column;padding:14px 16px;gap:6px;align-items:flex-start}.tbl-row [data-col]{display:none}.mobile-card{display:flex !important}}
.mobile-card{display:none;flex-direction:column;gap:5px;width:100%}
.mc-name{font-size:15px;font-weight:600}
.mc-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.mc-amounts{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:2px}
.tabs{display:flex;gap:6px;margin-bottom:1.5rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:2px}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{background:transparent;border:0.5px solid transparent;border-radius:99px;padding:7px 16px;font-size:13px;color:var(--text2);white-space:nowrap;flex-shrink:0;transition:all 0.15s}
.tab-btn.active{background:var(--brand-navy);color:var(--cream-100);border-color:var(--brand-navy);font-weight:500}
.tab-btn:hover:not(.active){background:var(--bg2);border-color:var(--border)}
.regel-head{display:grid;grid-template-columns:2fr 1.2fr 1fr 68px 100px 36px 36px;background:var(--bg2);border-bottom:0.5px solid var(--border);padding:9px 14px;gap:8px}
.regel-head>div{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em}
.regel-row{display:grid;grid-template-columns:2fr 1.2fr 1fr 68px 100px 36px 36px;padding:9px 14px;gap:8px;align-items:center;border-bottom:0.5px solid var(--border)}
.regel-row:last-child{border-bottom:none}
.line-attach-btn{background:transparent;border:0.5px solid var(--border2);border-radius:var(--r);width:32px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;flex-shrink:0;transition:background 0.15s}
.line-attach-btn:hover{background:var(--bg2)}
.line-attach-btn.has-file{border-color:#3b6d11;background:var(--green-bg)}
.line-attach-btn input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.line-attach-preview{display:flex;align-items:center;gap:8px;margin-top:6px;padding:6px 10px;background:var(--bg2);border-radius:var(--r);font-size:12px;color:var(--text2)}
.line-attach-preview a{color:var(--text);font-weight:500;text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.line-attach-preview a:hover{text-decoration:underline}
@media(max-width:700px){.regel-head{display:none}.regel-row{display:grid;grid-template-columns:1fr auto auto;grid-template-rows:auto auto auto auto;padding:14px;gap:8px}.regel-row .r-desc{grid-column:1;grid-row:1}.regel-row .r-attach{grid-column:2;grid-row:1}.regel-row .r-del{grid-column:3;grid-row:1;justify-self:end}.regel-row .r-cat{grid-column:1/4;grid-row:2}.regel-row .r-store{grid-column:1/4;grid-row:3}.regel-row .r-vat{grid-column:1;grid-row:4}.regel-row .r-amount{grid-column:2/4;grid-row:4}}
.attach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;padding:14px}
.attach-item{border:0.5px solid var(--border);border-radius:var(--r);overflow:hidden;position:relative;cursor:pointer}
.attach-item:hover .attach-del{opacity:1}

<script>
const SUPABASE_URL='https://qzmedbjyfirmxcvjbjit.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6bWVkYmp5ZmlybXhjdmpiaml0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDIyOTksImV4cCI6MjA5MTgxODI5OX0.qNDk_eL_oiBJFHgm-XhF1p2jdp96F29oF4OjLFYu1_Q';
const{createClient}=supabase;
const db=createClient(SUPABASE_URL,SUPABASE_KEY);

/* ── CONSTANTS ── */
const COST_CATS=['Ingredients','Staff','Transport','Equipment/Rental','Other'];
const REV_CATS=['Catering','Drinks package','Staff (charged)','Equipment (charged)','Other'];
const VAT={'9%':0.09,'21%':0.21,'0%':0};

const SC={'Quote sent':{bg:'#e6f1fb',fg:'#185fa5'},'Confirmed':{bg:'#eaf3de',fg:'#3b6d11'},'In progress':{bg:'#faeeda',fg:'#854f0b'},'Completed':{bg:'#d4f0e4',fg:'#0f6e56'},'Cancelled':{bg:'#fcebeb',fg:'#a32d2d'}};
const TASK_CATS=['Food','Facilities','Logistics','Administration'];
const TASK_STATUSES=['To Do','In Progress','Done'];
const ALLERGENS=['Nuts','Gluten','Dairy','Shellfish','Vegan','Other'];
const ROLES=['Head Chef','Sous Chef','Server','Driver','Event Coordinator','Other'];
const AV_BG=['#e6f1fb','#eaf3de','#faeeda','#fcebeb','#f0edfe','#fbeaf0'];
const AV_FG=['#185fa5','#3b6d11','#854f0b','#a32d2d','#534ab7','#993556'];

/* ── STATE ── */
// Single source of truth: events table for everything
// Admin = financial view of events
// Planner = task/operational view of events
let S={
  section:'home',
  // Events (shared source of truth)
  evView:'list',events:[],ev:null,evTab:'info',evSaving:false,evSaved:false,
  catTab:'kanban',task:null,newTaskForm:false,newNeedForm:false,newTaskData:{},plannerEvId:null,
  genTasks:[],genTaskForm:false,genTaskData:{},editingGenTaskId:null,
  // Team
  team:[],newTeamForm:false,editingTeamId:null,
  // Admin (financial view of events - same data)
  adminView:'overview',adminEv:null,adminTab:'info',adminSaving:false,adminSaved:false,
};

/* ── HELPERS ── */
const fmt=(n)=>'€\u202f'+Number(n||0).toLocaleString('nl-NL',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtDate=(d)=>{if(!d)return'—';const[y,m,day]=d.split('-');return day&&m&&y?`${day}-${m}-${y}`:d;};
const sum=(a)=>(a||[]).reduce((t,r)=>t+(parseFloat(r.amount)||0),0);
const vatSum=(a)=>(a||[]).reduce((t,r)=>t+(parseFloat(r.amount)||0)*(VAT[r.vat]||0),0);
const margin=(rev,cost)=>rev>0?((rev-cost)/rev)*100:0;
const uid=()=>Date.now()+'_'+Math.random().toString(36).slice(2,7);
const avColor=(name)=>{let h=0;for(const c of(name||'?'))h=(h*31+c.charCodeAt(0))%6;return{bg:AV_BG[h],fg:AV_FG[h]};};
const initials=(name)=>(name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
function avatar(name,size=38){const c=avColor(name);return`<div class="avatar" style="width:${size}px;height:${size}px;background:${c.bg};color:${c.fg}">${initials(name)}</div>`;}
function mBadge(pct){const p=parseFloat(pct)||0,c=p>=40?{bg:'#eaf3de',fg:'#3b6d11'}:p>=30?{bg:'#faeeda',fg:'#854f0b'}:{bg:'#fcebeb',fg:'#a32d2d'};return`<span class="badge" style="background:${c.bg};color:${c.fg}">${p.toFixed(1)}%</span>`;}
function sBadge(s){const c=SC[s]||SC['Quote sent'];return`<span class="badge" style="background:${c.bg};color:${c.fg}">${s||'—'}</span>`;}
function statC(label,val,sub='',accent=false){return`<div class="stat-card${accent?'':' muted'}"><div class="stat-label">${label}</div><div class="stat-value">${val}</div>${sub?`<div class="stat-sub">${sub}</div>`:''}</div>`;}
function fl(t){return`<div class="field-label">${t}</div>`;}
function countdown(dateStr){if(!dateStr)return'';const d=new Date(dateStr),now=new Date();now.setHours(0,0,0,0);const diff=Math.ceil((d-now)/(1000*60*60*24));if(diff<0)return'Past';if(diff===0)return'Today';if(diff===1)return'Tomorrow';return`${diff} days away`;}
function weekLabel(dateStr){if(!dateStr)return'Unscheduled';const d=new Date(dateStr),now=new Date();now.setHours(0,0,0,0);const diff=Math.ceil((d-now)/(1000*60*60*24));if(diff<0)return'Past';if(diff===0)return'Today';if(diff<=6)return'This week';if(diff<=13)return'Next week';if(diff<=30)return'This month';return'Later';}

/* ── NAV ── */
function go(s){S.section=s;render();}
function renderNav(){
  const links=[['home','Home'],['events','Events'],['catering','Planner'],['admin','Admin'],['tasks','Tasks'],['team','Team']];
  const logo=`<img src="Logo-gold.svg" style="width:38px;height:38px;object-fit:contain;flex-shrink:0" alt="The Hangout logo">`;
  document.getElementById('nav').innerHTML=`<div class="global-nav-inner"><div class="nav-brand">${logo}<span style="font-family:var(--font-display);font-size:15px;font-weight:700;letter-spacing:0.01em">The Hangout <span style="color:var(--brand-gold)">PM</span></span></div>${links.map(([s,l])=>`<button class="nav-link${S.section===s?' active':''}" onclick="go('${s}')">${l}</button>`).join('')}</div>`;
}

/* ── DATA LOADING ── */
async function loadAll(){
  try{
    await Promise.all([loadEvents(),loadTeam(),loadGenTasks()]);
  }catch(err){
    document.getElementById('app').innerHTML=`<div style="padding:2rem;color:#a32d2d;font-size:14px;line-height:1.8"><strong>Connection error</strong><br>${err.message}<br><br><button onclick="init()" style="padding:8px 16px;background:#1a1a18;color:#fff;border:none;border-radius:10px;cursor:pointer;font-size:13px">Retry</button></div>`;
  }
}
async function loadEvents(){
  const{data,error}=await db.from('events').select('*').order('date',{ascending:true});
  if(error)throw new Error('Events: '+error.message);
  S.events=data||[];
}
async function loadTeam(){
  const{data,error}=await db.from('team').select('*').order('created_at',{ascending:true});
  if(error)throw new Error('Team: '+error.message);
  S.team=data||[];
}
async function loadGenTasks(){
  const{data,error}=await db.from('general_tasks').select('*').order('created_at',{ascending:true});
  if(error)throw new Error('General tasks: '+error.message);
  S.genTasks=data||[];
}

/* ══════════════════════════════════════════
   EVENTS — single source of truth
══════════════════════════════════════════ */
function newEv(){
  S.ev={name:'',client:'',contact:'',email:'',phone:'',start_date:'',end_date:'',start_time:'',end_time:'',date:'',time:'',venue:'',address:'',event_type:'',guests:'',status:'Quote sent',description:'',requirements:'',dietary:'',notes:'',menu:'',menu_items:[],ingredients:[],costs:[],revenues:[],attachments:[],customer_needs:[],tasks:[],team_assignments:[]};
  S.evTab='info';S.evView='detail';S.section='events';render();
}
function openEv(id,tab='info'){
  const ev=S.events.find(e=>e.id===id);
  if(!ev)return;
  if(tab==='planner'){
    // Open in planner section
    S.ev={...ev};S.plannerEvId=id;S.catTab='kanban';S.task=null;S.newTaskForm=false;S.section='catering';render();
  } else {
    S.ev={...ev};S.evTab=tab;S.evView='detail';S.section='events';render();
  }
}
function backToPlanner(){
  if(S.task){S.task=null;render();return;}
  S.plannerEvId=null;S.ev=null;S.newTaskForm=false;render();
}
function backToEventList(){S.evView='list';S.ev=null;S.task=null;render();}
function sfEv(k,v){S.ev={...S.ev,[k]:v};}
function setEvTab(t){S.evTab=t;S.task=null;render();}

async function saveEv(silent=false){
  if(!silent){S.evSaving=true;render();}
  const ev=S.ev;
  const pl={name:ev.name||'',client:ev.client||'',contact:ev.contact||'',email:ev.email||'',phone:ev.phone||'',start_date:ev.start_date||'',end_date:ev.end_date||'',start_time:ev.start_time||'',end_time:ev.end_time||'',date:ev.start_date||ev.date||'',time:ev.start_time||ev.time||'',venue:ev.venue||'',address:ev.address||'',event_type:ev.event_type||'',guests:parseInt(ev.guests)||0,status:ev.status||'Quote sent',description:ev.description||'',requirements:ev.requirements||'',dietary:ev.dietary||'',notes:ev.notes||'',menu:ev.menu||'',menu_items:ev.menu_items||[],ingredients:ev.ingredients||[],costs:ev.costs||[],revenues:ev.revenues||[],attachments:ev.attachments||[],customer_needs:ev.customer_needs||[],tasks:ev.tasks||[],team_assignments:ev.team_assignments||[]};
  try{
    if(ev.id&&S.events.find(x=>x.id===ev.id)){
      const{error}=await db.from('events').update(pl).eq('id',ev.id);
      if(error)throw error;
    }else{
      const{data,error}=await db.from('events').insert(pl).select().single();
      if(error)throw error;
      if(data)S.ev={...S.ev,...data};
    }
    await loadEvents();
    if(S.ev?.id){S.ev={...S.events.find(x=>x.id===S.ev.id)||S.ev};}
    if(!silent){S.evSaving=false;S.evSaved=true;render();setTimeout(()=>{S.evSaved=false;render();},2200);}
    else{render();}
  }catch(err){
    console.error(err);
    alert('Save failed: '+err.message);
    S.evSaving=false;if(!silent)render();
  }
}

async function deleteEv(id){
  if(!confirm('Delete this event? This cannot be undone.'))return;
  await db.from('events').delete().eq('id',id);
  S.evView='list';S.ev=null;await loadEvents();render();
}

/* ── EVENT LINES (costs/revenues) ── */
function addEvLine(type){const r={id:uid(),description:'',amount:'',category:type==='costs'?COST_CATS[0]:REV_CATS[0],vat:type==='costs'?'21%':'9%'};sfEv(type,[...(S.ev[type]||[]),r]);render();}
function updEvLine(type,id,k,v){sfEv(type,(S.ev[type]||[]).map(r=>r.id===id?{...r,[k]:v}:r));}
function delEvLine(type,id){sfEv(type,(S.ev[type]||[]).filter(r=>r.id!==id));render();}

/* ── CUSTOMER NEEDS ── */
function addMenuItem(){
  const items=[...(S.ev.menu_items||[])];
  items.push({course:'',dish:'',qty:'',presentation:''});
  sfEv('menu_items',items);render();
}
function updMenuItem(i,field,value){
  const items=[...(S.ev.menu_items||[])];
  if(items[i])items[i]={...items[i],[field]:value};
  sfEv('menu_items',items);
}
function delMenuItem(i){
  const items=[...(S.ev.menu_items||[])];
  items.splice(i,1);
  sfEv('menu_items',items);render();
}
async function addNeed(){
  const text=(document.getElementById('need-text')?.value||'').trim();
  const count=document.getElementById('need-count')?.value||0;
  if(!text)return;
  S.ev={...S.ev,customer_needs:[...(S.ev.customer_needs||[]),{id:uid(),text,count:parseInt(count)||0}]};
  S.newNeedForm=false;await saveEv();
}
async function removeNeed(id){
  S.ev={...S.ev,customer_needs:(S.ev.customer_needs||[]).filter(n=>n.id!==id)};

async function createTask(){
  const d=S.newTaskData;
  if(!d.title?.trim()){alert('Enter a task title.');return;}
  const task={id:uid(),title:d.title.trim(),category:d.category||TASK_CATS[0],status:d.status||'To Do',assignees:d.assignees||[],assignee:(d.assignees||[])[0]||'',plannedDate:d.plannedDate||'',deadline:d.deadline||'',allergens:d.allergens||[],portions:d.portions||'',comments:[]};

function openTask(taskId){

}

async function toggleTaskAssignee(name){
  const arr=S.task.assignees||[];

  await updateTask('assignees',updated);

async function updateTask(field,value){

async function addComment(){
  const el=document.getElementById('comment-input');
  const text=(el?.value||'').trim();if(!text)return;
  const comment={id:uid(),text,author:'You',time:new Date().toLocaleString('nl-NL',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})};

/* ── FILE UPLOADS ── */
async function uploadEvFiles(files){
  if(!S.ev.id){alert('Save first.');return;}
  const att=[...(S.ev.attachments||[])];
  for(const file of files){
    const path=`ev-${S.ev.id}/${Date.now()}-${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
    const{data,error}=await db.storage.from('receipts').upload(path,file,{upsert:true});
    if(!error){const{data:u}=db.storage.from('receipts').getPublicUrl(path);att.push({id:uid(),name:file.name,url:u.publicUrl,path});}
    else alert('Upload failed: '+error.message);
  }
  S.ev={...S.ev,attachments:att};await saveEv();
}
async function delEvAtt(id){
  if(!confirm('Remove?'))return;
  const a=(S.ev.attachments||[]).find(x=>x.id===id);
  if(a?.path)await db.storage.from('receipts').remove([a.path]);
  S.ev={...S.ev,attachments:(S.ev.attachments||[]).filter(x=>x.id!==id)};await saveEv();
}
async function uploadEvLineFile(type,id,file){
  if(!file)return;if(!S.ev.id){alert('Save first.');return;}
  const path=`ev-${S.ev.id}/${type}-${id}-${Date.now()}-${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
  const{data,error}=await db.storage.from('receipts').upload(path,file,{upsert:true});
  if(error){alert('Upload failed: '+error.message);return;}
  const{data:u}=db.storage.from('receipts').getPublicUrl(path);
  sfEv(type,(S.ev[type]||[]).map(r=>r.id===id?{...r,file_url:u.publicUrl,file_name:file.name,file_path:path}:r));
  await saveEv();
}
async function delEvLineFile(type,id){
  const line=(S.ev[type]||[]).find(r=>r.id===id);
  if(line?.file_path)await db.storage.from('receipts').remove([line.file_path]);
  sfEv(type,(S.ev[type]||[]).map(r=>r.id===id?{...r,file_url:null,file_name:null,file_path:null}:r));
  await saveEv();
}

function renderEventsList(){
  const evs=S.events;
  const today=new Date().toISOString().slice(0,10);
  const upcoming=evs.filter(e=>e.date>=today);
  const past=evs.filter(e=>e.date<today);
  const tR=evs.reduce((a,e)=>a+sum(e.revenues||[]),0);
  const tC=evs.reduce((a,e)=>a+sum(e.costs||[]),0);
  const confirmed=evs.filter(e=>['Confirmed','In progress'].includes(e.status)).length;

  const evCard=(e)=>{
    const tasks=e.tasks||[];
    const done=tasks.filter(t=>t.status==='Done').length;
    const pct=tasks.length>0?Math.round(done/tasks.length*100):0;
    const rv=sum(e.revenues||[]);
    const cd=countdown(e.date);
    return`<div class="event-card" onclick="openEv(${e.id})">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
        <div style="font-size:15px;font-weight:600">${e.name||'Untitled'}</div>
        ${sBadge(e.status)}
      </div>
      <div style="font-size:12px;color:var(--text2);display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px">
        <span>${fmtDate(e.date)}${e.time?' · '+e.time:''}</span>
        <span>${e.guests||0} guests</span>
        ${e.venue?`<span>${e.venue}</span>`:''}
        <span style="color:${cd==='Past'?'#a32d2d':cd==='Today'||cd==='Tomorrow'?'#854f0b':'var(--text2)'}">${cd}</span>
      </div>
      ${tasks.length>0?`<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`:''}
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">
        <div class="task-counts">
          <span class="count-pill" style="background:var(--blue-bg);color:var(--blue-fg)">${tasks.filter(t=>t.status==='To Do').length} to do</span>
          <span class="count-pill" style="background:var(--amber-bg);color:var(--amber-fg)">${tasks.filter(t=>t.status==='In Progress').length} in progress</span>
          <span class="count-pill" style="background:var(--green-bg);color:var(--green-fg)">${done} done</span>
        </div>
        <span style="font-size:12px;color:var(--text2)">${fmt(rv)}</span>
      </div>
    </div>`;
  };

  return`
    <div class="topbar"><div><div class="title">Events</div><div class="subtitle">All events — source of truth for Admin and Planner</div></div><div class="topbar-right"><button class="btn-primary" onclick="newEv()">+ New event</button></div></div>
    <div class="stats-row">${statC('Total',evs.length,confirmed+' confirmed')}${statC('Total revenue',fmt(tR))}${statC('Total costs',fmt(tC))}${statC('Gross margin',fmt(tR-tC),tR>0?((tR-tC)/tR*100).toFixed(1)+'%':'—',true)}</div>
    ${evs.length===0?`<div class="empty">No events yet.<br><button class="btn-primary" style="margin-top:1rem" onclick="newEv()">Create first event</button></div>`:
    `${upcoming.length>0?`<div class="section-label" style="margin-bottom:10px">Upcoming (${upcoming.length})</div><div class="event-grid" style="margin-bottom:1.5rem">${upcoming.map(evCard).join('')}</div>`:''}
     ${past.length>0?`<div class="section-label" style="margin-bottom:10px">Past (${past.length})</div><div class="event-grid">${past.map(evCard).join('')}</div>`:''}`}`;
}

    const aBtn=`<label class="line-attach-btn r-attach${hf?' has-file':''}" title="${hf?'Replace':'Attach'}"><input type="file" accept="image/*,.pdf,.doc,.docx" onchange="${uploadFn}('${type}','${r.id}',this.files[0])">${hf?`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#3b6d11" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>`:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>`}</label>`;
    const prev=hf?`<div style="grid-column:1/-1;padding:0 0 6px 0"><div class="line-attach-preview">${isImg(r.file_name)?`<img src="${r.file_url}" style="width:32px;height:32px;object-fit:cover;border-radius:4px;flex-shrink:0">`:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text2)" stroke-width="1.5" style="flex-shrink:0"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`}<a href="${r.file_url}" target="_blank">${r.file_name||'View'}</a><button onclick="${delFileFn}('${type}','${r.id}')" style="background:transparent;border:none;color:var(--text3);font-size:16px;cursor:pointer;padding:0 2px;line-height:1;flex-shrink:0">×</button></div></div>`:'';

  }).join('');

function renderFinancialView(ev){
  const tR=sum(ev.revenues||[]),tC=sum(ev.costs||[]),vatR=vatSum(ev.revenues||[]),vatC=vatSum(ev.costs||[]),mg=tR-tC,m=margin(tR,tC);
  const guests=parseFloat(ev.guests)||0;
  // Profit after VAT = gross margin - net VAT to pay
  const netVat=vatR-vatC; // amount to remit to tax authority
  const profitAfterVat=mg-netVat;
  const profitMarginAfterVat=(tR+vatR)>0?(profitAfterVat/(tR+vatR))*100:0;
  const alertStyle=m>=40?`background:var(--green-bg);color:var(--green-fg)`:m>=30?`background:var(--amber-bg);color:var(--amber-fg)`:`background:var(--red-bg);color:var(--red-fg)`;

function renderEvTimeline(tasks){
  // Group tasks by plannedDate, then deadline, then unscheduled
  const withDate=tasks.filter(t=>t.plannedDate||t.deadline).sort((a,b)=>(a.plannedDate||a.deadline||'').localeCompare(b.plannedDate||b.deadline||''));
  const noDate=tasks.filter(t=>!t.plannedDate&&!t.deadline);
  const grouped={};
  for(const t of withDate){const d=t.plannedDate||t.deadline;if(!grouped[d])grouped[d]=[];grouped[d].push(t);}
  const today=new Date().toISOString().slice(0,10);
  return`<div class="tl-wrap">
    ${Object.entries(grouped).map(([d,ts])=>{
      const isPast=d<today;const isToday=d===today;
      const label=isToday?`Today — ${fmtDate(d)}`:isPast?`Past — ${fmtDate(d)}`:fmtDate(d);
      const color=isPast?'#a32d2d':isToday?'var(--teal-500)':'var(--text2)';
      return`<div class="tl-day"><div class="tl-day-header" style="color:${color}">${label}</div>${ts.map(t=>`<div class="tl-item" onclick="openTask('${t.id}')"><div class="tl-time" style="min-width:28px">${t.status==='Done'?'✓':'•'}</div><div class="tl-body"><div class="tl-title">${t.title}</div><div class="tl-meta"><span>${t.category}</span><span class="badge" style="font-size:10px;padding:1px 7px;background:${t.status==='In Progress'?'var(--amber-bg)':t.status==='Done'?'var(--green-bg)':'var(--blue-bg)'};color:${t.status==='In Progress'?'var(--amber-fg)':t.status==='Done'?'var(--green-fg)':'var(--blue-fg)'}">${t.status}</span>${(t.assignees||[t.assignee]).filter(Boolean).map(a=>`<span>${a}</span>`).join('')}${t.deadline&&t.deadline!==d?`<span style="color:var(--text2)">Due: ${fmtDate(t.deadline)}</span>`:''}</div></div></div>`).join('')}</div>`;
    }).join('')}
    ${noDate.length>0?`<div class="tl-day"><div class="tl-day-header" style="color:var(--text3)">Unscheduled (${noDate.length})</div>${noDate.map(t=>`<div class="tl-item" onclick="openTask('${t.id}')"><div class="tl-time" style="min-width:28px">—</div><div class="tl-body"><div class="tl-title">${t.title}</div><div class="tl-meta"><span>${t.category}</span><span>${t.status}</span></div></div></div>`).join('')}</div>`:''}
  </div>`;
}

function renderCategories(tasks){
  return TASK_CATS.map(cat=>{

function evalFormula(formula,guests){
  if(!formula)return'';
  // Allow =expr with guest count as variable
  try{
    const expr=formula.replace(/^=/,'').replace(/guests/gi,String(guests||0));
    const result=Function('"use strict";return('+expr+')')();
    return isFinite(result)?Number(result).toFixed(2):'?';
  }catch{return'?';}
}

function renderPlannerOverview(){
  const today=new Date().toISOString().slice(0,10);
  const all=S.events.filter(e=>e.status!=='Cancelled').sort((a,b)=>a.date.localeCompare(b.date));
  const upcoming=all.filter(e=>e.date>=today);
  if(all.length===0)return`<div class="topbar"><div><div class="title">Planner</div><div class="subtitle">Upcoming events & tasks</div></div><div class="topbar-right"><button class="btn-primary" onclick="newEv()">+ New event</button></div></div><div class="empty">No events yet. Create an event to get started.</div>`;

  const totalTasks=all.reduce((a,e)=>(a+(e.tasks||[]).length),0);
  const doneTasks=all.reduce((a,e)=>(a+(e.tasks||[]).filter(t=>t.status==='Done').length),0);
  const openTasks=totalTasks-doneTasks;
  const allergenEvents=all.filter(e=>(e.customer_needs||[]).length>0).length;

  const evBlock=(ev)=>{
    const tasks=ev.tasks||[];
    const done=tasks.filter(t=>t.status==='Done').length;
    const pct=tasks.length>0?Math.round(done/tasks.length*100):0;
    const openList=tasks.filter(t=>t.status!=='Done').sort((a,b)=>(a.plannedDate||a.deadline||'zz').localeCompare(b.plannedDate||b.deadline||'zz'));
    const cd=countdown(ev.date);
    const cdColor=cd==='Today'||cd==='Tomorrow'?'#854f0b':cd==='Past'?'#a32d2d':'var(--text2)';
    return`<div class="plan-ev-block">
      <div class="plan-ev-header">
        <div style="font-size:12px;font-weight:600;color:var(--text2);min-width:90px">${fmtDate(ev.date)}${ev.time?' · '+ev.time:''}</div>
        <div style="font-size:15px;font-weight:600;flex:1">${ev.name||'Untitled'}</div>
        ${sBadge(ev.status)}
        <span style="font-size:12px;color:${cdColor};white-space:nowrap">${cd}</span>
        <button class="btn-ghost" style="padding:4px 10px;font-size:12px;flex-shrink:0" onclick="openEv(${ev.id},'planner')">Open &#8250;</button>
      </div>
      ${ev.venue||ev.guests?`<div style="font-size:12px;color:var(--text2);margin-bottom:8px">${[ev.venue,ev.guests?ev.guests+' guests':'',ev.event_type].filter(Boolean).join(' · ')}</div>`:''}
      ${(ev.customer_needs||[]).length>0?`<div style="font-size:12px;color:#a32d2d;margin-bottom:8px;padding:6px 10px;background:var(--red-bg);border-radius:var(--r)">&#9888; ${(ev.customer_needs||[]).map(n=>`${n.count?'<strong>'+n.count+'</strong> guests ':''}<span>${n.text}</span>`).join(' · ')}</div>`:''}
      ${tasks.length>0?`<div style="display:flex;gap:8px;align-items:center;margin-bottom:10px"><div class="progress-bar" style="flex:1;margin:0"><div class="progress-fill" style="width:${pct}%"></div></div><span style="font-size:11px;color:var(--text2);flex-shrink:0">${done}/${tasks.length} done</span></div>`:''}
      ${openList.length===0&&tasks.length>0
        ?`<div style="font-size:12px;color:var(--green-fg);padding:6px 0;font-weight:500">&#10003; All tasks completed</div>`
        :openList.length===0
        ?`<div style="font-size:12px;color:var(--text3);padding:6px 0">No tasks yet. <button class="btn-ghost" style="padding:3px 8px;font-size:11px" onclick="openEv(${ev.id},'planner')">Add tasks &#8250;</button></div>`
        :openList.slice(0,4).map(t=>`<div class="tl-item" onclick="openEv(${ev.id},'planner')">
          <div class="tl-time">${t.plannedDate?fmtDate(t.plannedDate):'—'}</div>
          <div class="tl-body">
            <div class="tl-title">${t.title||'Untitled'}</div>
            <div class="tl-meta">
              <span class="badge" style="background:var(--bg2);color:var(--text2);font-size:10px;padding:1px 7px;font-weight:400">${t.category}</span>
              <span class="badge" style="font-size:10px;padding:1px 7px;background:${t.status==='In Progress'?'var(--amber-bg)':'var(--blue-bg)'};color:${t.status==='In Progress'?'var(--amber-fg)':'var(--blue-fg)'}">${t.status}</span>
              ${(t.assignees?.length?t.assignees:[t.assignee].filter(Boolean)).map(a=>`<span>${a}</span>`).join('')}
              ${t.deadline?`<span style="color:${new Date(t.deadline)<new Date()&&t.status!=='Done'?'#a32d2d':'var(--text2)'}">Due: ${fmtDate(t.deadline)}</span>`:''}
            </div>
          </div>
        </div>`).join('')}
      ${openList.length>4?`<div style="font-size:12px;color:var(--teal-500);padding:4px 0;cursor:pointer" onclick="openEv(${ev.id},'planner')">+${openList.length-4} more tasks &#8250;</div>`:''}
    </div>`;
  };

  const buckets={};
  for(const ev of upcoming){const b=weekLabel(ev.date);if(!buckets[b])buckets[b]=[];buckets[b].push(ev);}
  const bucketOrder=['Today','This week','Next week','This month','Later'];
  const sections=bucketOrder.filter(b=>buckets[b]?.length).map(b=>`
    <div style="margin-bottom:2rem">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:1rem;padding-bottom:6px;border-bottom:0.5px solid var(--border)">${b} (${buckets[b].length})</div>
      ${buckets[b].map(evBlock).join('')}
    </div>`).join('');
  const pastEvs=all.filter(e=>e.date<today);
  const pastSection=pastEvs.length>0?`<div style="margin-bottom:2rem"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:1rem;padding-bottom:6px;border-bottom:0.5px solid var(--border)">Past (${pastEvs.length})</div>${pastEvs.map(evBlock).join('')}</div>`:'';

  return`
    <div class="topbar"><div><div class="title">Planner</div><div class="subtitle">${upcoming.length} upcoming · ${openTasks} open tasks</div></div><div class="topbar-right"><button class="btn-primary" onclick="newEv()">+ New event</button></div></div>
    <div class="stats-row">${statC('Upcoming',upcoming.length)}${statC('Open tasks',openTasks,doneTasks+' completed')}${statC('Allergen alerts',allergenEvents)}${statC('Team',S.team.length)}</div>
    <div class="tl-wrap">${sections}${pastSection}</div>`;
}

function openAdminEv(id){
  const ev=S.events.find(e=>e.id===id);
  if(!ev)return;
  S.adminEv={...ev};S.adminTab='info';S.adminView='detail';render();
}
function backAdmin(){S.adminView='overview';S.adminEv=null;render();}
function setAdminTab(t){S.adminTab=t;render();}
function sfAdmin(k,v){S.adminEv={...S.adminEv,[k]:v};}

async function saveAdmin(){
  S.adminSaving=true;render();
  // Sync admin changes back into S.ev if same event is open
  if(S.ev?.id===S.adminEv?.id)S.ev={...S.adminEv};
  S.ev=S.adminEv;
  await saveEv(true);
  S.adminEv=S.ev;
  S.adminSaving=false;S.adminSaved=true;render();

}

const GEN_CATS=['Administration','Food','Facilities','Logistics'];
const GEN_STATUSES=['To Do','In Progress','Done'];

async function saveGenTask(gt){
  // Read title from DOM in case state wasn't updated (input focus not lost)
  const titleEl=document.getElementById('gtd-title-new')||document.getElementById('gtd-title-'+(gt.id||''));
  const title=(titleEl?.value||gt.title||'').trim();
  if(!title){alert('Please enter a task title.');return;}
  const pl={title,category:gt.category||S.genTaskData.category||'Administration',status:gt.status||S.genTaskData.status||'To Do',assignees:gt.assignees||S.genTaskData.assignees||[],planned_date:gt.planned_date||S.genTaskData.planned_date||'',deadline:gt.deadline||S.genTaskData.deadline||'',notes:gt.notes||S.genTaskData.notes||''};
  try{
    if(gt.id){const{error}=await db.from('general_tasks').update(pl).eq('id',gt.id);if(error)throw error;}
    else{const{error}=await db.from('general_tasks').insert(pl);if(error)throw error;}
    S.genTaskForm=false;S.genTaskData={};S.editingGenTaskId=null;
    await loadGenTasks();render();
  }catch(err){alert('Failed to save: '+err.message);}
}
async function deleteGenTask(id){
  if(!confirm('Delete task?'))return;
  await db.from('general_tasks').delete().eq('id',id);
  await loadGenTasks();render();
}
async function moveGenTask(id,status){
  await db.from('general_tasks').update({status}).eq('id',id);
  await loadGenTasks();render();
}
function setGTD(k,v){S.genTaskData={...S.genTaskData,[k]:v};}
function toggleGTDAssignee(name){
  const arr=S.genTaskData.assignees||[];
  S.genTaskData={...S.genTaskData,assignees:arr.includes(name)?arr.filter(x=>x!==name):[...arr,name]};
  render();
}

function renderGeneralTasks(){
  const tasks=S.genTasks;
  const byStatus=(s)=>tasks.filter(t=>t.status===s);
  const d=S.genTaskData||{};
  const editId=S.editingGenTaskId;

  const taskRow=(gt)=>{
    if(editId===gt.id){
      return`<div class="card" style="padding:1.25rem;margin-bottom:10px">
        <div class="grid-2" style="margin-bottom:12px">
          <div>${fl('Title')}<input value="${(gt.title||'').replace(/"/g,'&quot;')}" oninput="setGTD('title',this.value)" id="gtd-title-${gt.id}"></div>
          <div>${fl('Category')}<select onchange="setGTD('category',this.value)">${GEN_CATS.map(c=>`<option${c===(d.category||gt.category)?' selected':''}>${c}</option>`).join('')}</select></div>
          <div>${fl('Status')}<select onchange="setGTD('status',this.value)">${GEN_STATUSES.map(s=>`<option${s===(d.status||gt.status)?' selected':''}>${s}</option>`).join('')}</select></div>
          <div>${fl('Planned date')}<input type="date" value="${d.planned_date||gt.planned_date||''}" onchange="setGTD('planned_date',this.value)"></div>
          <div>${fl('Deadline')}<input type="date" value="${d.deadline||gt.deadline||''}" onchange="setGTD('deadline',this.value)"></div>
          <div style="grid-column:1/-1">${fl('Notes')}<textarea onchange="setGTD('notes',this.value)">${(d.notes!==undefined?d.notes:gt.notes||'').replace(/</g,'&lt;')}</textarea></div>
          <div style="grid-column:1/-1">${fl('Assignees')}<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px">${S.team.map(m=>{const sel=(d.assignees||gt.assignees||[]).includes(m.name);return`<button type="button" onclick="toggleGTDAssignee('${m.name}')" style="display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:99px;border:0.5px solid ${sel?'var(--brand-navy)':'var(--border2)'};background:${sel?'var(--navy-500)':'var(--bg2)'};color:${sel?'var(--cream-100)':'var(--text)'};font-size:13px;cursor:pointer">${avatar(m.name,22)}<span>${m.name}</span></button>`;}).join('')}</div></div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn-primary" onclick="saveGenTask({id:${gt.id},...S.genTaskData})">Save</button>
          <button class="btn-ghost" onclick="S.editingGenTaskId=null;S.genTaskData={};render()">Cancel</button>
          <button class="btn-danger" onclick="deleteGenTask(${gt.id})">Delete</button>
        </div>
      </div>`;
    }
    const hasDeadline=gt.deadline&&new Date(gt.deadline)<new Date()&&gt.status!=='Done';
    return`<div class="task-card" style="margin-bottom:8px;cursor:default">
      ${hasDeadline?`<div style="font-size:11px;color:#a32d2d;margin-bottom:4px;font-weight:500">&#9888; Overdue: ${fmtDate(gt.deadline)}</div>`:''}
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <div style="flex:1;min-width:0">
          <div class="task-card-title">${gt.title||'Untitled'}</div>
          <div class="task-card-meta">
            <span class="badge" style="background:var(--bg2);color:var(--text2);font-weight:400">${gt.category}</span>
            ${gt.planned_date?`<span>Plan: ${fmtDate(gt.planned_date)}</span>`:''}
            ${gt.deadline?`<span style="color:${hasDeadline?'#a32d2d':'var(--text2)'}">Due: ${fmtDate(gt.deadline)}</span>`:''}
            ${(gt.assignees||[]).map(a=>`<span>${a}</span>`).join('')}
          </div>
          ${gt.notes?`<div style="font-size:12px;color:var(--text2);margin-top:6px">${gt.notes.replace(/</g,'&lt;')}</div>`:''}
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          <select style="font-size:11px;padding:3px 6px;border-radius:var(--r);background:var(--bg2);border:0.5px solid var(--border);color:var(--text2)" onchange="moveGenTask(${gt.id},this.value)">${GEN_STATUSES.map(s=>`<option${s===gt.status?' selected':''}>${s}</option>`).join('')}</select>
          <button class="btn-icon" style="font-size:14px;opacity:0.6" onclick="S.editingGenTaskId=${gt.id};S.genTaskData={...S.genTasks.find(x=>x.id===${gt.id})};render()">&#9998;</button>
        </div>
      </div>
    </div>`;
  };

  const newForm=S.genTaskForm?`<div class="card" style="padding:1.25rem;margin-bottom:1.25rem">
    <div class="section-label" style="margin-bottom:1rem">New task</div>
    <div class="grid-2" style="margin-bottom:12px">
      <div>${fl('Title')}<input id="gtd-title-new" placeholder="e.g. Send contract" oninput="setGTD('title',this.value)"></div>
      <div>${fl('Category')}<select onchange="setGTD('category',this.value)">${GEN_CATS.map(c=>`<option${c===(d.category||'Administration')?' selected':''}>${c}</option>`).join('')}</select></div>
      <div>${fl('Status')}<select onchange="setGTD('status',this.value)">${GEN_STATUSES.map(s=>`<option${s===(d.status||'To Do')?' selected':''}>${s}</option>`).join('')}</select></div>
      <div>${fl('Planned date')}<input type="date" value="${d.planned_date||''}" onchange="setGTD('planned_date',this.value)"></div>
      <div>${fl('Deadline')}<input type="date" value="${d.deadline||''}" onchange="setGTD('deadline',this.value)"></div>
      <div style="grid-column:1/-1">${fl('Notes')}<textarea onchange="setGTD('notes',this.value)"></textarea></div>
      <div style="grid-column:1/-1">${fl('Assignees')}<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px">${S.team.map(m=>{const sel=(d.assignees||[]).includes(m.name);return`<button type="button" onclick="toggleGTDAssignee('${m.name}')" style="display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:99px;border:0.5px solid ${sel?'var(--brand-navy)':'var(--border2)'};background:${sel?'var(--navy-500)':'var(--bg2)'};color:${sel?'var(--cream-100)':'var(--text)'};font-size:13px;cursor:pointer">${avatar(m.name,22)}<span>${m.name}</span></button>`;}).join('')}</div></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-primary" onclick="saveGenTask(S.genTaskData)">Add task</button>
      <button class="btn-ghost" onclick="S.genTaskForm=false;S.genTaskData={};render()">Cancel</button>
    </div>
  </div>`:'' ;

  return`
    <div class="topbar"><div><div class="title">Tasks</div><div class="subtitle">General & administration tasks</div></div><div class="topbar-right"><button class="btn-primary" onclick="S.genTaskForm=true;S.genTaskData={};render()">+ New task</button></div></div>
    ${newForm}
    <div class="kanban">${GEN_STATUSES.map(s=>{
      const ct=byStatus(s);
      const colors={'To Do':{bg:'var(--blue-bg)',fg:'var(--blue-fg)'},'In Progress':{bg:'var(--amber-bg)',fg:'var(--amber-fg)'},'Done':{bg:'var(--green-bg)',fg:'var(--green-fg)'}};
      const col=colors[s];
      return`<div class="kanban-col"><div class="kanban-col-header"><span style="color:${col.fg}">${s}</span><span class="badge" style="background:${col.bg};color:${col.fg}">${ct.length}</span></div>${ct.length===0?`<div style="font-size:12px;color:var(--text3);text-align:center;padding:1rem 0">Empty</div>`:ct.map(taskRow).join('')}</div>`;
    }).join('')}</div>`;
}

/* ══════════════════════════════════════════
   TEAM
══════════════════════════════════════════ */
async function saveTeamMember(m){
  const pl={name:m.name||'',role:m.role||ROLES[0],notes:m.notes||''};
  if(m.id){await db.from('team').update(pl).eq('id',m.id);}
  else{await db.from('team').insert(pl);}
  S.editingTeamId=null;S.newTeamForm=false;await loadTeam();render();
}
async function deleteTeamMember(id){
  if(!confirm('Remove?'))return;
  await db.from('team').delete().eq('id',id);
  await loadTeam();render();
}

function renderTeam(){
  return`
    <div class="topbar"><div><div class="title">Team</div><div class="subtitle">Your catering team</div></div><div class="topbar-right"><button class="btn-primary" onclick="S.newTeamForm=true;S.editingTeamId=null;render()">+ Add member</button></div></div>
    ${S.newTeamForm?`<div class="card" style="padding:1.25rem;margin-bottom:1.25rem">
      <div class="section-label">New team member</div>
      <div class="grid-2" style="margin-bottom:12px">
        <div>${fl('Name')}<input id="tm-name" placeholder="Full name"></div>
        <div>${fl('Default role')}<select id="tm-role">${ROLES.map(r=>`<option>${r}</option>`).join('')}</select></div>
        <div style="grid-column:1/-1">${fl('Notes / general info')}<textarea id="tm-notes" placeholder="e.g. allergic to nuts, driver's license, available weekends..."></textarea></div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-primary" onclick="saveTeamMember({name:document.getElementById('tm-name').value,role:document.getElementById('tm-role').value,notes:document.getElementById('tm-notes').value})">Add member</button>
        <button class="btn-ghost" onclick="S.newTeamForm=false;render()">Cancel</button>
      </div>
    </div>`:''}
    ${S.team.length===0&&!S.newTeamForm?`<div class="empty">No team members yet.</div>`:`<div class="team-grid">${S.team.map(m=>{
      if(S.editingTeamId===m.id)return`<div class="team-card" style="flex-direction:column;gap:10px">
        <input id="edit-name-${m.id}" value="${(m.name||'').replace(/"/g,'&quot;')}" placeholder="Name">
        <select id="edit-role-${m.id}">${ROLES.map(r=>`<option${r===m.role?' selected':''}>${r}</option>`).join('')}</select>
        <textarea id="edit-notes-${m.id}" placeholder="Notes / general info" style="min-height:60px">${(m.notes||'').replace(/</g,'&lt;')}</textarea>
        <div style="display:flex;gap:6px">
          <button class="btn-primary" style="flex:1;padding:7px" onclick="saveTeamMember({id:${m.id},name:document.getElementById('edit-name-${m.id}').value,role:document.getElementById('edit-role-${m.id}').value,notes:document.getElementById('edit-notes-${m.id}').value})">Save</button>
          <button class="btn-ghost" style="padding:7px 12px" onclick="S.editingTeamId=null;render()">Cancel</button>
        </div>
      </div>`;
      return`<div class="team-card">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:${m.notes?'8px':'0'}">
          ${avatar(m.name)}
          <div style="flex:1;min-width:0">
            <div style="font-weight:500;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.name}</div>
            <div style="font-size:12px;color:var(--text2)">${m.role}</div>
          </div>
          <div style="display:flex;gap:4px;flex-shrink:0">
            <button class="btn-icon" style="font-size:14px;opacity:0.6" onclick="S.editingTeamId=${m.id};render()" title="Edit">&#9998;</button>
            <button class="btn-icon" style="color:#a32d2d;font-size:16px" onclick="deleteTeamMember(${m.id})">×</button>
          </div>
        </div>
        ${m.notes?`<div style="font-size:12px;color:var(--text2);background:var(--bg2);border-radius:var(--r);padding:8px 10px;line-height:1.5">${m.notes.replace(/</g,'&lt;')}</div>`:''}
      </div>`;
    }).join('')}</div>`}`;
}

/* ══════════════════════════════════════════
   HOME
══════════════════════════════════════════ */
function renderHome(){
  const today=new Date().toISOString().slice(0,10);
  const upcoming=S.events.filter(e=>e.date>=today&&e.status!=='Cancelled').length;
  const tR=S.events.reduce((a,e)=>a+sum(e.revenues||[]),0);
  const openTasks=S.events.reduce((a,e)=>a+(e.tasks||[]).filter(t=>t.status!=='Done').length,0);
  return`
    <div style="margin-bottom:1.5rem"><div class="title" style="font-size:28px">The Hangout Project Manager</div><div class="subtitle" style="color:var(--teal-500);font-weight:600;letter-spacing:0.06em;text-transform:uppercase;font-size:11px;margin-top:4px">Catering Management Platform</div></div>
    <div class="home-grid">
      <div class="home-card" onclick="go('events')">
        <div class="home-card-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text2)" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
        <div class="home-card-title">Events</div>
        <div class="home-card-sub">All event details, costs, tasks, team and documents in one place.</div>
        <div class="home-card-count">${S.events.length} total · ${upcoming} upcoming</div>
      </div>
      <div class="home-card" onclick="go('catering')">
        <div class="home-card-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text2)" stroke-width="1.5"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></div>
        <div class="home-card-title">Planner</div>
        <div class="home-card-sub">Timeline of upcoming events. Tasks, allergens and team assignments at a glance.</div>
        <div class="home-card-count">${upcoming} upcoming · ${openTasks} open tasks</div>
      </div>
      <div class="home-card" onclick="go('admin')">
        <div class="home-card-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text2)" stroke-width="1.5"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
        <div class="home-card-title">Admin</div>
        <div class="home-card-sub">Financial view of all events — revenue, costs, VAT and margins.</div>
        <div class="home-card-count">${S.events.length} events · ${fmt(tR)} revenue</div>
      </div>
    </div>`;
}

/* ══════════════════════════════════════════
   RENDER
══════════════════════════════════════════ */
function render(){
  renderNav();
  const app=document.getElementById('app');
  let html='';
  if(S.section==='home')html=renderHome();
  else if(S.section==='events'){
    if(S.evView==='list')html=renderEventsList();
    else if(S.evView==='detail')html=renderEventDetail();
  }
  else if(S.section==='catering')html=renderPlanner();
  else if(S.section==='admin'){
    if(S.adminView==='overview')html=renderAdminOverview();
    else if(S.adminView==='detail')html=renderAdminDetail();
  }
  else if(S.section==='tasks')html=renderGeneralTasks();
  else if(S.section==='team')html=renderTeam();
  app.innerHTML=html;
}

async function init(){
  await loadAll();
  render();
}
init();
</script>
</body>
</html>
